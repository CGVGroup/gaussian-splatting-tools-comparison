site_name: Gaussian Splatting Tools Comparison
site_description: Structured overview and experimental analysis of Gaussian Splatting training pipelines and XR visualization environments.
repo_url: https://github.com/CGVGroup/gaussian-splatting-tools-comparison
repo_name: gaussian-splatting-tools-comparison
docs_dir: docs
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Overview:
    - overview/index.md
    - Trainers: overview/trainers.md
    - Viewers: overview/viewers.md
  - Analysis:
    - Trainers:
      - Methodology: analysis/trainers/methodology.md
      - Indoor: analysis/trainers/indoor.md
      - Outdoor: analysis/trainers/outdoor.md
      - Indoor vs Outdoor: analysis/trainers/indoor-vs-outdoor.md
    - Viewers:
      - Methodology: analysis/viewers/methodology.md
      - XR Viewers: analysis/viewers/xr-viewers.md
  - How-To:
    - how-to/index.md
    - Trainers:
      - Inria: how-to/trainers/inria.md
      - gsplat: how-to/trainers/gsplat.md
      - OpenSplat: how-to/trainers/opensplat.md
      - Nerfstudio: how-to/trainers/nerfstudio.md
      - LichtFeld Studio: how-to/trainers/lichtfeldstudio.md
    - Viewers:
      - ninjamode: how-to/viewers/ninjamode.md
      - clarte53: how-to/viewers/clarte53.md
